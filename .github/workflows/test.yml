name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-rust:
    name: Rust Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bindings/takumi-render-uniffi -> target

      - name: Run Global Cargo Test
        run: cargo test

      - name: Run UniFFI Binding Cargo Test
        run: cargo test --manifest-path bindings/takumi-render-uniffi/Cargo.toml
